<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentinel</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <canvas id="particleCanvas"></canvas>
  <div id="cursorGlow"></div>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="shield-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3z" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
        <div class="logo-text">
          <h1>Sentinel</h1>
          <p class="tagline">Zero-Day Anomaly Protection</p>
        </div>
      </div>
      <div class="status-indicator" id="statusIndicator">
        <div class="status-dot"></div>
        <span>Protected</span>
      </div>
    </header>

    <!-- URL Scanner -->
    <section class="scanner-section">
      <div class="input-group">
        <input type="text" id="urlInput" placeholder="Paste any URL to scan..." spellcheck="false">
        <button id="scanBtn" class="btn-scan">
          <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" />
          </svg>
        </button>
      </div>

      <!-- Scan Result (hidden by default) -->
      <div id="scanResult" class="scan-result hidden">
        <div class="result-header">
          <div class="result-icon" id="resultIcon"></div>
          <div class="result-info">
            <h3 id="resultStatus">Analyzing...</h3>
            <p id="resultUrl"></p>
          </div>
        </div>
        <div class="result-details">
          <div class="detail-row">
            <span class="detail-label">Confidence</span>
            <div class="progress-bar">
              <div class="progress-fill" id="confidenceBar"></div>
              <span class="progress-text" id="confidenceText">0%</span>
            </div>
          </div>
          <div class="detail-row">
            <span class="detail-label">Reason</span>
            <p class="detail-value" id="resultReason">-</p>
          </div>
          <div class="detail-row">
            <span class="detail-label">Time</span>
            <p class="detail-value" id="processingTime">-</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Stats Dashboard — 3x2 compact grid -->
    <section class="stats-section">
      <h2 class="section-label">Statistics</h2>
      <div class="stats-grid">
        <div class="stat-card blocked">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
              <path d="M4.93 4.93l14.14 14.14" stroke="currentColor" stroke-width="2" />
            </svg>
          </div>
          <div class="stat-body">
            <span class="stat-num" id="blockedCount">0</span>
            <span class="stat-label">Blocked</span>
          </div>
        </div>

        <div class="stat-card safe">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2" />
            </svg>
          </div>
          <div class="stat-body">
            <span class="stat-num" id="safeCount">0</span>
            <span class="stat-label">Safe</span>
          </div>
        </div>

        <div class="stat-card warning">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </div>
          <div class="stat-body">
            <span class="stat-num" id="warningCount">0</span>
            <span class="stat-label">Warnings</span>
          </div>
        </div>

        <div class="stat-card total">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2" />
              <path d="M9 9h6M9 13h6M9 17h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </div>
          <div class="stat-body">
            <span class="stat-num" id="totalCount">0</span>
            <span class="stat-label">Total</span>
          </div>
        </div>

        <div class="stat-card anomaly">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
                stroke="currentColor" stroke-width="2" />
            </svg>
          </div>
          <div class="stat-body">
            <span class="stat-num" id="anomalyCount">0</span>
            <span class="stat-label">Anomalies</span>
          </div>
        </div>

        <div class="stat-card homograph">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M3 5h18M3 12h18M3 19h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </div>
          <div class="stat-body">
            <span class="stat-num" id="homographCount">0</span>
            <span class="stat-label">Homographs</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Compact Threat Distribution -->
    <section class="threat-bars">
      <h2 class="section-label">Threat Distribution</h2>
      <div class="threat-bar-row">
        <span class="bar-label" id="legendBlocked">Blocked: 0</span>
        <div class="bar-track">
          <div class="bar-fill danger" id="barBlocked"></div>
        </div>
      </div>
      <div class="threat-bar-row">
        <span class="bar-label" id="legendWarning">Warnings: 0</span>
        <div class="bar-track">
          <div class="bar-fill warning" id="barWarning"></div>
        </div>
      </div>
      <div class="threat-bar-row">
        <span class="bar-label" id="legendSafe">Safe: 0</span>
        <div class="bar-track">
          <div class="bar-fill safe" id="barSafe"></div>
        </div>
      </div>
    </section>

    <!-- Compact Activity -->
    <section class="activity-section">
      <h2 class="section-label">Recent Activity</h2>
      <div id="activityTimeline" class="activity-list">
        <div class="timeline-empty">
          <p>No activity yet</p>
        </div>
      </div>
    </section>

    <!-- Footer row -->
    <footer class="footer">
      <button id="clearCacheBtn" class="btn-clear">
        <svg viewBox="0 0 24 24" fill="none" width="13" height="13">
          <path
            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
        Clear Cache
      </button>
      <span class="version-tag">v3.0.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>

</html>
